name: Auto-tag on version change

on:
  push:
    branches:
      - main
    paths:
      - package.json

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version change and create tag
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREV=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")

          if [ "$CURRENT" != "$PREV" ]; then
            TAG="v${CURRENT}"
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              git tag "$TAG"
              git push origin "$TAG"
              echo "Created tag $TAG"
            else
              echo "Tag $TAG already exists, skipping"
            fi
          else
            echo "Version unchanged ($CURRENT), skipping"
          fi
